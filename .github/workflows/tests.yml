name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  offline-tests:
    name: Offline unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline unit tests
        run: |
          python -m unittest \
            tests.test_tools \
            tests.test_guardrails \
            tests.test_agent_parse \
            tests.test_demo_events \
            tests.test_risk_scorer \
            tests.test_llm_errors \
            tests.test_export_format \
            tests.test_settings_secrets \
            -v

  docker-smoke:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t sasa:ci .

      - name: Start container
        run: |
          docker run -d --name sasa-smoke -p 8501:8501 \
            -e GROQ_API_KEY=ci-smoke-placeholder \
            -e LLM_PROVIDER=groq \
            sasa:ci

      - name: Wait for Streamlit health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health; then
              echo "Streamlit healthy"
              exit 0
            fi
            sleep 2
          done
          docker logs sasa-smoke
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f sasa-smoke
