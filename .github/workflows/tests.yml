name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  offline-tests:
    name: Offline unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline unit tests
        run: |
          python -m unittest \
            tests.test_tools \
            tests.test_guardrails \
            tests.test_agent_parse \
            tests.test_demo_events \
            tests.test_risk_scorer \
            tests.test_llm_errors \
            tests.test_export_format \
            tests.test_settings_secrets \
            -v
